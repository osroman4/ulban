<style>
  :root{
    --paper:#F1E7D2; --ink:#143E3A; --ink-soft:#3D5C58;
    --saffron:#E0A12E; --turq:#2E9C92; --clay:#BC5A3C;
    --shadow:0 18px 40px -22px rgba(14,47,44,.55);
  }
  *{box-sizing:border-box}
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--paper);color:var(--ink);
    font-family:'Assistant',system-ui,sans-serif;line-height:1.7;padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .card{max-width:560px;width:100%;text-align:center}
  .logo{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--saffron);margin:0 auto 1.4rem}
  .check{
    width:88px;height:88px;border-radius:50%;background:var(--turq);color:#fff;
    display:grid;place-items:center;font-size:2.6rem;margin:0 auto 1.6rem;
    box-shadow:var(--shadow);
  }
  .ar{font-family:'Amiri',serif;font-weight:700;color:var(--turq);font-size:1.3rem;margin-bottom:.5rem}
  h1{font-family:'Frank Ruhl Libre',Georgia,serif;font-weight:900;font-size:clamp(1.7rem,4.5vw,2.6rem);line-height:1.3;margin:0 0 .5em}
  p.lead{font-size:1.15rem;color:var(--ink-soft);margin:0 0 2rem}
  .btns{display:flex;flex-wrap:wrap;gap:.8rem;justify-content:center}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:.5em;
    font-family:'Assistant',sans-serif;font-weight:700;font-size:1.05rem;
    padding:.85em 1.7em;border-radius:999px;border:2px solid transparent;text-decoration:none;
    transition:transform .18s ease,background .18s ease;
  }
  .btn-wa{background:#1faf54;color:#fff;box-shadow:0 10px 24px -12px rgba(31,175,84,.9)}
  .btn-wa:hover{background:#178f44;transform:translateY(-2px)}
  .btn-ghost{background:transparent;color:var(--ink);border-color:rgba(20,62,58,.25)}
  .btn-ghost:hover{border-color:var(--ink);transform:translateY(-2px)}
  :focus-visible{outline:3px solid var(--turq);outline-offset:3px}
</style>
</head>
<body>
  <main class="card">
    <img class="logo" src="logo.jpg" alt="לוגו אולבן" />
    <div class="check" aria-hidden="true">✓</div>
    <div class="ar">شُكراً كتير</div>
    <h1>שֻכְּרַן כְּתִיר — אחזור אליך בהקדם 🙏</h1>
    <p class="lead">קיבלתי את הפרטים שלך. נאד'יר יחזור אליך בטלפון או במייל. רוצה כבר עכשיו? אפשר גם בוואטסאפ.</p>
    <div class="btns">
      <a href="https://wa.me/972526805855" class="btn btn-wa" target="_blank" rel="noopener">כתבו בוואטסאפ</a>
      <a href="/" class="btn btn-ghost">חזרה לדף הבית</a>
    </div>
  </main>
</body>
</html>
